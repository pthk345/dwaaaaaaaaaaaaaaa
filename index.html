// PLACE TOWER
// ============================================================
const MAX_ALLIES = 6;

function placeTower(row, col, def) {
  if (gold < def.cost) return false;
  if (grid[row][col] !== TILE_ZONE) return false; // только на зонах с маркером
  if (towers.length >= MAX_ALLIES) {
    // Показываем предупреждение
    const n = document.getElementById('wave-notify');
    if(n){ n.textContent='⚠ Максимум 6 союзников на карте!'; n.style.opacity='1'; setTimeout(()=>n.style.opacity='0',2500); }
    return false;
  }
  if (towers.find(t => t.row===row && t.col===col)) return false;
  
  gold -= def.cost;
  updateHUD();
  
  const tower = {
    id: Date.now() + Math.random(),
    row, col, def,
    level: 1,
    damage: def.damage,
    range: def.range,
    attackSpeed: def.attackSpeed,
    cooldown: 0,
    totalSpent: def.cost,
    special: def.special || null,
  };
  towers.push(tower);
  
  // 3D model
  let model = assets.clone(def.modelKey);
  if (!model) {
    const geo = new THREE.CylinderGeometry(0.25, 0.3, 0.7, 8);
    const mat = new THREE.MeshLambertMaterial({ color: def.color || 0x888888 });
    model = new THREE.Mesh(geo, mat);
  }
  
  // Scale
  const box = new THREE.Box3().setFromObject(model);
  const sz = new THREE.Vector3();
  box.getSize(sz);
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  if (maxDim > 0) {
    const s = 0.7 / maxDim;
    model.scale.set(s, s, s);
  }
  
  model.position.set(col * TILE_SIZE, 0.15, row * TILE_SIZE);
  model.traverse(m => { if(m.isMesh) { m.castShadow=true; } });
  model.userData = { towerId: tower.id };

  // ── Убираем zone_marker с этой клетки ───────────────────────
  const zoneMarker = _sceneObjects.find(o =>
    o.userData && o.userData.tileSubtype === 'zone_marker' &&
    o.userData.row === row && o.userData.col === col
  );
  if (zoneMarker) {
    scene.remove(zoneMarker);
    _sceneObjects.splice(_sceneObjects.indexOf(zoneMarker), 1);
    const ti = tileObjects.indexOf(zoneMarker);
    if (ti !== -1) tileObjects.splice(ti, 1);
  }

  // ── Анимация появления: scale 0 → 1 с overshoot + белая вспышка ──
  const finalScale = model.scale.clone();
  model.scale.setScalar(0.001); // начинаем с почти нулевого размера
  addToScene(model);
  towerMeshes[tower.id] = model;

  _placementAnims.push({
    model,
    baseScale: finalScale,
    dur: 0.42,   // длительность анимации в секундах
    t: 0,
    done: false,
  });

  // ── Lightning: добавляем turret-голову поверх башни ──
  if (def.id === 'lightning') {
    const turretModel = assets.clone('weapon_turret');
    if (turretModel) {
      // Масштаб: крупная голова — хорошо видна поверх башни
      const tb = new THREE.Box3().setFromObject(turretModel);
      const ts = new THREE.Vector3();
      tb.getSize(ts);
      const tm = Math.max(ts.x, ts.y, ts.z);
      if (tm > 0) { const sc = 0.95 / tm; turretModel.scale.set(sc, sc, sc); }
      // Поднимаем высоко над основанием башни
      turretModel.position.set(0, 0.90, 0);
      turretModel.traverse(m => { if(m.isMesh) m.castShadow = true; });
      turretModel.userData.isLightningTurret = true;
      model.add(turretModel); // дочерний объект — двигается вместе с башней
      tower._turretHead = turretModel;
    }
  }
  
  return true;
}

function upgradeTower(tower) {
  if (tower.level >= 4) return false;
  const upg = UPGRADE_MULT[tower.level - 1];
  const cost = Math.floor(tower.def.cost * upg.cost);
  if (gold < cost) return false;
  
  gold -= cost;
  tower.totalSpent += cost;
  tower.damage = Math.floor(tower.def.damage * upg.damage);
  tower.range = tower.def.range * upg.range;
  tower.attackSpeed = tower.def.attackSpeed * upg.attackSpeed;
  tower.level++;
  
  // Visual upgrade indicator
  const mesh = towerMeshes[tower.id];
  if (mesh) {
    mesh.scale.multiplyScalar(1.1);
    // Чистый scale-пульс вместо emissive (который ломает материалы Kenney)
    const origScale = mesh.scale.clone();
    const pulseScale = origScale.clone().multiplyScalar(1.18);
    mesh.scale.copy(pulseScale);
    setTimeout(() => { if (towerMeshes[tower.id]) mesh.scale.copy(origScale); }, 250);
    // Партикл-вспышка
    spawnHitParticle(mesh.position.clone().add(new THREE.Vector3(0, 0.5, 0)), 0);
  }
  
  updateHUD();
  showTowerInfo(tower);
  return true;
}

function sellTower(tower) {
  const idx = towers.indexOf(tower);
  if (idx === -1) return;
  
  gold += Math.floor(tower.totalSpent * 0.6);
  towers.splice(idx, 1);
  
  const mesh = towerMeshes[tower.id];
  if (mesh) { scene.remove(mesh); delete towerMeshes[tower.id]; }
  
  hideTowerInfo();
  updateHUD();
}

function spawnEnemy(typeId, hpMult) {
  const def = ENEMY_DEFS.find(e => e.id === typeId) || ENEMY_DEFS[0];
  
  let model = assets.clone(def.modelKey);
  if (!model) {
    const geo = new THREE.SphereGeometry(0.25, 8, 6);
    const mat = new THREE.MeshLambertMaterial({ color: def.color });
    model = new THREE.Mesh(geo, mat);
  }
  
  const box = new THREE.Box3().setFromObject(model);
  const sz = new THREE.Vector3();
  box.getSize(sz);
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  const s = (def.scale || 0.4) / maxDim;
  model.scale.set(s, s, s);
  
  // Start position
  const startCell = (paths.length > 0 ? paths[0][0] : path[0]) || path[0];
  model.position.set(startCell[1] * TILE_SIZE, 0.3, startCell[0] * TILE_SIZE);
  model.traverse(m => { if(m.isMesh) m.castShadow = true; });
  addToScene(model);
  
  // Health bar (sprite)
  const hbCanvas = document.createElement('canvas');
  hbCanvas.width = 64; hbCanvas.height = 8;
  const hbCtx = hbCanvas.getContext('2d');
  const hbTex = new THREE.CanvasTexture(hbCanvas);
  const hbMat = new THREE.SpriteMaterial({ map: hbTex, depthTest: false });
  const hbSprite = new THREE.Sprite(hbMat);
  hbSprite.scale.set(0.8, 0.1, 1);
  hbSprite.position.set(0, 0.6, 0);
  model.add(hbSprite);
  
  const maxHp = def.hp * hpMult;
  const enemy = {
    id: ++enemyId,
    def, model, hbCanvas, hbCtx, hbTex, hbSprite,
    hp: maxHp, maxHp,
    speed: def.speed,
    pathIdx: 0,
    // Рандомный путь если несколько финишей, иначе основной
    ownPath: paths.length > 1
      ? paths[Math.floor(Math.random() * paths.length)]
      : path,
    // Анимация: уникальный фазовый сдвиг для каждого врага
    animT: Math.random() * Math.PI * 2,
    baseY: 0.3,
    dead: false,
    reached: false,
    slowTimer: 0,
    poisonTimer: 0,
    poisonDmg: 0,
    stunTimer: 0,
  };
  
  enemies.push(enemy);
  updateHealthBar(enemy);
  return enemy;
}

function updateHealthBar(enemy) {
  const pct = Math.max(0, enemy.hp / enemy.maxHp);
  const ctx = enemy.hbCtx;
  ctx.clearRect(0, 0, 64, 8);
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 0, 64, 8);
  ctx.fillStyle = pct > 0.5 ? '#2ecc71' : pct > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillRect(1, 1, Math.floor(pct * 62), 6);
  enemy.hbTex.needsUpdate = true;
}

function damageEnemy(enemy, dmg, effect) {
  if (enemy.dead) return;
  enemy.hp -= dmg;
  updateHealthBar(enemy);
  
  if (effect === 'slow') enemy.slowTimer = Math.max(enemy.slowTimer, 2);
  if (effect === 'freeze') enemy.slowTimer = Math.max(enemy.slowTimer, 3);
  if (effect === 'poison') { enemy.poisonTimer = 5; enemy.poisonDmg = dmg * 0.1; }
  if (effect === 'stun') enemy.stunTimer = Math.max(enemy.stunTimer, 1.5);
  
  spawnHitParticle(enemy.model.position.clone(), dmg);
  
  if (enemy.hp <= 0) killEnemy(enemy);
}

function killEnemy(enemy) {
  if (enemy.dead) return;
  enemy.dead = true;
  gold += enemy.def.reward;
  updateHUD();
  spawnDeathParticles(enemy.model.position.clone());
  scene.remove(enemy.model);
}

function fireProjectile(tower, enemy) {
  const startPos = new THREE.Vector3(
    tower.col * TILE_SIZE, 0.5, tower.row * TILE_SIZE
  );
  
  // Снаряд — крупнее и ярче
  const tId = tower.def.id;
  const projColors  = { cannon:0xff6600, sniper:0x44aaff, machinegun:0xffff00, freeze:0x00eeff, ballista:0xff8800 };
  const projSizes   = { cannon:0.13, sniper:0.07, machinegun:0.09, freeze:0.10, ballista:0.11 };
  const geo = new THREE.SphereGeometry(projSizes[tId] || 0.09, 8, 6);
  const mat = new THREE.MeshBasicMaterial({ color: projColors[tId] || 0xffffff });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(startPos);
  addToScene(mesh);

  // Хвост снаряда (trail) — маленькая вытянутая сфера сзади
  const trailMat = new THREE.MeshBasicMaterial({ color: projColors[tId] || 0xffffff, transparent:true, opacity:0.5 });
  const trailGeo = new THREE.SphereGeometry((projSizes[tId]||0.09)*0.6, 6, 4);
  const trail = new THREE.Mesh(trailGeo, trailMat);
  mesh.add(trail); // прикреплён к снаряду

  const proj = {
    mesh, trail,
    targetId: enemy.id,
    tower,
    damage: tower.damage,
    speed: tId==='sniper' ? 14 : tId==='machinegun' ? 12 : 9,
    dead: false,
  };
  projectiles.push(proj);

  // ── GUN FLASH + SMOKE + SPARKLES ──────────────────────────
  if (tId !== 'lightning') spawnMuzzleFlash(startPos, tId);
}

function spawnMuzzleFlash(pos, tId) {
  const flashColors = {
    cannon:     [0xff6600, 0xffaa00, 0xffff00],
    sniper:     [0x44aaff, 0xffffff, 0xaaddff],
    machinegun: [0xffff00, 0xff8800, 0xffffff],
    freeze:     [0x00eeff, 0xaaffff, 0xffffff],
    ballista:   [0xff8800, 0xffcc44, 0xffff00],
  };
  const cols = flashColors[tId] || [0xffffff, 0xffcc44, 0xff8800];

  // 1. ВСПЫШКА — большой яркий диск на мгновение
  const flashGeo = new THREE.SphereGeometry(0.32, 8, 8);
  const flashMat = new THREE.MeshBasicMaterial({ color: cols[1], transparent:true, opacity:1.0, depthWrite:false });
  const flash = new THREE.Mesh(flashGeo, flashMat);
  flash.position.copy(pos);
  flash.position.y += 0.1;
  addToScene(flash);
  particles.push({ mesh:flash, vel:new THREE.Vector3(0,0,0), life:0.08, maxLife:0.08, isFlash:true });

  // 2. ОГОНЬ — несколько ярких конусообразных частиц вперёд
  const dir2enemy = new THREE.Vector3(
    (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.3, (Math.random()-0.5)*0.5
  ).normalize();
  for (let i = 0; i < 5; i++) {
    const fGeo = new THREE.SphereGeometry(0.07 + Math.random()*0.06, 5, 4);
    const fMat = new THREE.MeshBasicMaterial({ color: cols[Math.floor(Math.random()*cols.length)], transparent:true, opacity:1.0, depthWrite:false });
    const fMesh = new THREE.Mesh(fGeo, fMat);
    fMesh.position.copy(pos);
    fMesh.position.y += 0.05;
    addToScene(fMesh);
    const spd = 2.5 + Math.random()*3;
    const spread = 0.6;
    particles.push({
      mesh: fMesh,
      vel: new THREE.Vector3(
        dir2enemy.x*spd + (Math.random()-0.5)*spread,
        0.5 + Math.random()*1.5,
        dir2enemy.z*spd + (Math.random()-0.5)*spread
      ),
      life: 0.15 + Math.random()*0.12,
      maxLife: 0.15 + Math.random()*0.12,
      scale0: fMesh.scale.x,
    });
  }

  // 3. ДЫМ — серые облачка после выстрела
  for (let i = 0; i < 4; i++) {
    const sGeo = new THREE.SphereGeometry(0.1 + Math.random()*0.08, 6, 5);
    const grey = 0x888888 + Math.floor(Math.random()*0x333333);
    const sMat = new THREE.MeshBasicMaterial({ color:grey, transparent:true, opacity:0.7, depthWrite:false });
    const sMesh = new THREE.Mesh(sGeo, sMat);
    sMesh.position.copy(pos);
    sMesh.position.y += 0.1;
    addToScene(sMesh);
    particles.push({
      mesh: sMesh,
      vel: new THREE.Vector3(
        (Math.random()-0.5)*0.8,
        0.8 + Math.random()*1.2,
        (Math.random()-0.5)*0.8
      ),
      life: 0.35 + Math.random()*0.25,
      maxLife: 0.35 + Math.random()*0.25,
      isSmoke: true,
    });
  }

  // 4. ИСКРЫ — быстрые маленькие яркие частицы во все стороны
  for (let i = 0; i < 8; i++) {
    const spkGeo = new THREE.SphereGeometry(0.025, 4, 3);
    const spkMat = new THREE.MeshBasicMaterial({ color: cols[0], transparent:true, opacity:1.0, depthWrite:false });
    const spkMesh = new THREE.Mesh(spkGeo, spkMat);
    spkMesh.position.copy(pos);
    spkMesh.position.y += 0.05;
    addToScene(spkMesh);
    const spd2 = 4 + Math.random()*6;
    const a = Math.random()*Math.PI*2;
    particles.push({
      mesh: spkMesh,
      vel: new THREE.Vector3(
        Math.cos(a)*spd2, 1.5 + Math.random()*3, Math.sin(a)*spd2
      ),
      life: 0.18 + Math.random()*0.14,
      maxLife: 0.18 + Math.random()*0.14,
      isSpark: true,
    });
  }
}

// ── ОТРАЖЕНИЕ: перевёрнутая копия тайлов карты ─────────────────
// ── ОТРАЖЕНИЕ: stencil-маска = точно по силуэту клонов ─────────────────────
const _MIRROR_Y = -0.01;
const _REFL_GAP  =  0.003;

function buildReflection() {
  if (_reflGroup) { scene.remove(_reflGroup); _reflGroup = null; }

  const grp = new THREE.Group();

  tileObjects.forEach(obj => {
    const clone = obj.clone();
    clone.traverse(child => {
      if (!child.isMesh || !child.material) return;
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      child.material = mats.map(m => {
        let nm;
        // ShaderMaterial (старый wobble) и onBeforeCompile-материалы
        // не клонируются корректно → берём цвет/текстуру и делаем чистый Lambert
        if (m.isShaderMaterial || (m.onBeforeCompile && m.onBeforeCompile.toString().length > 10)) {
          const col = m.uniforms && m.uniforms.uColor
            ? m.uniforms.uColor.value
            : (m.color ? m.color.clone() : new THREE.Color(0x7bc965));
          const map = (m.uniforms && m.uniforms.uMap && m.uniforms.uMap.value)
            ? m.uniforms.uMap.value
            : (m.map || null);
          nm = new THREE.MeshLambertMaterial({ color: col, map: map });
        } else {
          nm = m.clone();
          if (m.map)    nm.map    = m.map;
          if (m.color)  nm.color.copy(m.color);
        }
        nm.transparent  = false;
        nm.opacity      = 1.0;
        nm.depthWrite   = true;
        nm.side         = THREE.BackSide;
        // ── STENCIL: каждый пиксель отражения пишет 1 в stencil-буфер ──
        nm.stencilWrite = true;
        nm.stencilFunc  = THREE.AlwaysStencilFunc;
        nm.stencilZPass = THREE.ReplaceStencilOp;
        nm.stencilRef   = 1;
        return nm;
      });
      if (child.material.length === 1) child.material = child.material[0];
      child.receiveShadow = false;
      child.castShadow    = false;
    });
    grp.add(clone);
  });

  grp.scale.set(1, -1, 1);
  grp.position.y = 2 * _MIRROR_Y - _REFL_GAP;
  grp.renderOrder = 1;
  _reflGroup = grp;
  scene.add(grp);

}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
let rangeRing = null;


// ══════════════════════════════════════════════════════════════════
// WOBBLE — шейдерная анимация: только крона качается, основание неподвижно
// Взято из Писюнк; освещение сделано ярче (ambient 0.55 + diff 0.65)
// ══════════════════════════════════════════════════════════════════
window._wobbleObjects = []; // { obj, phase, speed, amp, yMin, yMax }
window._wobbleTime = 0;

// Создаёт материал с wobble через onBeforeCompile —
// Three.js сам считает всё освещение (hemi/dir/shadow), мы только деформируем вершины
function makeWobbleMaterial(origMat, phase, speed, amp) {
  const mat = origMat.clone();
  if (origMat.map) { mat.map = origMat.map; mat.needsUpdate = true; }

  const wobbleUniforms = {
    uTime:  { value: 0 },
    uPhase: { value: phase },
    uSpeed: { value: speed },
    uAmp:   { value: amp },
    uYMin:  { value: 0 },
    uYMax:  { value: 1 },
  };

  mat.onBeforeCompile = (shader) => {
    Object.assign(shader.uniforms, wobbleUniforms);
    shader.vertexShader = `
      uniform float uTime;
      uniform float uPhase;
      uniform float uSpeed;
      uniform float uAmp;
      uniform float uYMin;
      uniform float uYMax;
    ` + shader.vertexShader;
    shader.vertexShader = shader.vertexShader.replace(
      '#include <begin_vertex>',
      `
      vec3 transformed = vec3(position);
      float mask = smoothstep(
        uYMin + (uYMax - uYMin) * 0.25,
        uYMin + (uYMax - uYMin) * 0.75,
        position.y
      );
      transformed.x += sin(uTime * uSpeed + uPhase) * uAmp * mask;
      transformed.z += sin(uTime * uSpeed * 0.7 + uPhase + 1.3) * uAmp * 0.6 * mask;
      `
    );
    mat._wobbleShaderUniforms = shader.uniforms;
  };
  mat.customProgramCacheKey = () => `wobble_${phase.toFixed(3)}_${speed.toFixed(3)}`;
  return mat;
}

// Применяет wobble к объекту: заменяет материалы на onBeforeCompile-версию
function applyWobble(obj, opts) {
  const { phase, speed, amp } = opts;

  const box = new THREE.Box3().setFromObject(obj);
  const invWorld = new THREE.Matrix4().copy(obj.matrixWorld).invert();
  const localBox = box.clone().applyMatrix4(invWorld);

  obj.traverse(m => {
    if (!m.isMesh) return;
    const origMat = Array.isArray(m.material) ? m.material[0] : m.material;

    // Вычисляем Y-диапазон меша в local space объекта для маски кроны
    const meshBox = new THREE.Box3().setFromObject(m);
    const localMeshBox = meshBox.clone().applyMatrix4(invWorld);
    const yMin = localMeshBox.min.y;
    const yMax = localMeshBox.max.y;

    const wMat = makeWobbleMaterial(origMat, phase, speed, amp);

    // onBeforeCompile вызовется при первой компиляции и сохранит _wobbleShaderUniforms.
    // До этого патчим wobbleUniforms напрямую через замыкание в makeWobbleMaterial.
    // Чтобы передать yMin/yMax ДО компиляции — перезапишем их в том же объекте uniforms.
    // Доступ через _wobbleInitUniforms, который мы сохраним здесь:
    wMat._wobbleInitUniforms = { uYMin: yMin, uYMax: yMax };

    // Переопределим onBeforeCompile чтобы подставить правильные yMin/yMax
    const prevCompile = wMat.onBeforeCompile;
    wMat.onBeforeCompile = (shader) => {
      prevCompile(shader);
      shader.uniforms.uYMin.value = yMin;
      shader.uniforms.uYMax.value = yMax;
      wMat._wobbleShaderUniforms = shader.uniforms;
    };

    m._origMaterial = origMat;
    m.material = wMat;
    m._wobbleMat = wMat;
  });

  window._wobbleObjects.push({ obj, phase, speed, amp });
}

// Обновляет uTime для всех wobble материалов
function updateWobble(dt) {
  window._wobbleTime += dt;
  const t = window._wobbleTime;
  for (const item of window._wobbleObjects) {
    item.obj.traverse(m => {
      if (m._wobbleMat && m._wobbleMat._wobbleShaderUniforms) {
        m._wobbleMat._wobbleShaderUniforms.uTime.value = t;
      }
    });
  }
}
// ══════════════════════════════════════════════════════════════════

function gameLoop(ts) {
  animFrameId = requestAnimationFrame(gameLoop);
  
  const dt = Math.min((ts - lastTime) / 1000, 0.1) * gameSpeed;
  lastTime = ts;

  // Анимация воды — Voronoi shader: обновляем время и позицию камеры
  if (window._waterMesh && window._waterMesh.material.uniforms) {
    const wu = window._waterMesh.material.uniforms;
    wu.uTime.value += dt;
    wu.uCamXZ.value.set(camera.position.x, camera.position.z);
    // Плоскость следует за камерой чтобы вода была везде
    window._waterMesh.position.x = camera.position.x;
    window._waterMesh.position.z = camera.position.z;
  }

  // Пена отключена (шейдер создаёт блики сам)

  // ── Wobble анимация растительности ────────────────────────────
  updateWobble(Math.min((ts - (window._lastWobbleTs || ts)) / 1000, 0.05));
  window._lastWobbleTs = ts;

  // ── Анимация кувшинок и камышей ───────────────────────────
  if (window._lilypadMeshes && window._lilypadMeshes.length > 0) {
    const rawDt = Math.min((ts - (window._lastLilyTs || ts)) / 1000, 0.05);
    window._lastLilyTs = ts;
    for (const m of window._lilypadMeshes) {
      if (!m.userData.isLilypad) continue;
      m.userData.lilyT += rawDt * (m.userData.lilySpeed || 0.35);
      const t = m.userData.lilyT;

      // Покачивание по X и Z — два слоя синусов для «живого» эффекта
      m.rotation.x = Math.sin(t   + m.userData.lilyPhaseX)          * m.userData.lilyAmpX
                   + Math.sin(t*2.3 + m.userData.lilyPhaseX * 0.7)  * m.userData.lilyAmpX * 0.35;
      m.rotation.z = Math.cos(t*0.8 + m.userData.lilyPhaseZ)        * m.userData.lilyAmpZ
                   + Math.cos(t*1.7 + m.userData.lilyPhaseZ * 0.5)  * m.userData.lilyAmpZ * 0.25;

      // Волна по Y — кувшинка приподнимается на гребне
      m.position.y = m.userData.baseY
                   + Math.sin(t*0.7  + m.userData.lilyPhaseX) * 0.018
                   + Math.sin(t*1.5  + m.userData.lilyPhaseZ) * 0.008
                   + Math.sin(t*0.31 + (m.userData.lilyPhaseX||0)*0.3) * 0.005;

      // Медленное вращение вокруг Y (кувшинку кружит течением)
      if (m.userData.lilyRotSpeed) m.rotation.y += rawDt * m.userData.lilyRotSpeed;

      // ТЕЧЕНИЕ: дрейф + зацикливание
      if (m.userData.lilyDriftX || m.userData.lilyDriftZ) {
        m.position.x += m.userData.lilyDriftX;
        m.position.z += m.userData.lilyDriftZ;
        if (m.userData.spawnX !== undefined) {
          const ddx = m.position.x - m.userData.spawnX;
          const ddz = m.position.z - m.userData.spawnZ;
          const dist2 = Math.sqrt(ddx*ddx + ddz*ddz);
          if (dist2 > (m.userData.maxDrift || 20)) {
            m.position.x = m.userData.spawnX - ddx * 0.97;
            m.position.z = m.userData.spawnZ - ddz * 0.97;
          }
        }
      }
      // Синхронизируем тень с позицией кувшинки — точно под ней
      if (m.userData.shadowDisc) {
        m.userData.shadowDisc.position.x = m.position.x;
        m.userData.shadowDisc.position.y = m.position.y - 0.01; // вплотную под кувшинкой
        m.userData.shadowDisc.position.z = m.position.z;
        const heightFactor = Math.max(0.15, 0.30 - (m.position.y - m.userData.baseY) * 3.0);
        m.userData.shadowDisc.material.opacity = heightFactor;
      }
    }
  }


  if (gameState !== 'playing') {
    renderer.render(scene, camera);
    return;
  }
  
  updateEnemies(dt);
  updateTowers(dt);
  updateProjectiles(dt);
  updateParticles(dt);
  updatePlacementAnims(dt);
  updateWaveSpawner(dt);
  checkWaveComplete();
  
  renderer.render(scene, camera);
}

function updateEnemies(dt) {
  for (const enemy of enemies) {
    if (enemy.dead || enemy.reached) continue;

    // ── Анимация левитации и вращения тарелки ──
    enemy.animT += dt;
    const t = enemy.animT;
    // Левитация: плавное покачивание вверх-вниз
    enemy.model.position.y = enemy.baseY + Math.sin(t * 2.1) * 0.08;
    // Вращение: медленно крутится + лёгкий наклон
    if (enemy.def.isFinalBoss) {
      // Berdyeva: медленное вращение, тяжёлая поступь
      enemy.model.rotation.y += dt * 0.8;
      enemy.model.rotation.z = Math.sin(t * 0.6) * 0.06;
      enemy.model.rotation.x = Math.cos(t * 0.4) * 0.04;
      // Более выраженная левитация
      enemy.model.position.y = enemy.baseY + Math.sin(t * 1.0) * 0.18;
    } else {
      enemy.model.rotation.y += dt * 1.8;
      enemy.model.rotation.z = Math.sin(t * 1.3) * 0.12;
      enemy.model.rotation.x = Math.cos(t * 0.9) * 0.06;
    }
    
    if (enemy.stunTimer > 0) { enemy.stunTimer -= dt; continue; }
    
    // Status effects
    if (enemy.poisonTimer > 0) {
      enemy.poisonTimer -= dt;
      damageEnemy(enemy, enemy.poisonDmg * dt, null);
    }
    
    const speed = enemy.slowTimer > 0 ? enemy.speed * 0.4 : enemy.speed;
    if (enemy.slowTimer > 0) enemy.slowTimer -= dt;
    
    // Используем индивидуальный путь врага
    const ePath = enemy.ownPath || path;

    // Move along path
    if (enemy.pathIdx >= ePath.length - 1) {
      // Reached end
      enemy.reached = true;
      lives--;
      updateHUD();
      scene.remove(enemy.model);
      if (lives <= 0) triggerGameOver();
      continue;
    }
    
    const nextCell = ePath[enemy.pathIdx + 1];
    const target = new THREE.Vector3(nextCell[1] * TILE_SIZE, enemy.model.position.y, nextCell[0] * TILE_SIZE);
    const dir = target.clone().sub(enemy.model.position);
    const dist = dir.length();
    
    if (dist < 0.05) {
      enemy.pathIdx++;

      // На развилке — проверяем есть ли альтернативные пути
      // Если да, с вероятностью 40% переключаемся на другой путь к другому финишу
      if (paths.length > 1 && enemy.pathIdx < ePath.length - 1) {
        const curCell = ePath[enemy.pathIdx];
        const curKey = curCell[0]+','+curCell[1];
        const neighbors = roadGraph[curKey] || [];
        // Это развилка если у текущей клетки 3+ соседа (не считая откуда пришли)
        if (neighbors.length >= 3 && Math.random() < 0.4) {
          // Выбираем случайный путь который проходит через текущую клетку
          const validPaths = paths.filter(p => {
            return p.some(([r,c]) => r === curCell[0] && c === curCell[1]);
          });
          if (validPaths.length > 1) {
            const newPath = validPaths[Math.floor(Math.random() * validPaths.length)];
            // Находим позицию текущей клетки в новом пути
            const newIdx = newPath.findIndex(([r,c]) => r === curCell[0] && c === curCell[1]);
            if (newIdx >= 0) {
              enemy.ownPath = newPath;
              enemy.pathIdx = newIdx;
            }
          }
        }
      }
    } else {
      dir.normalize();
      enemy.model.position.add(dir.multiplyScalar(speed * dt));

      // ── Плавные повороты на изгибах: смотрим вперёд на следующую клетку ──
      // Берём взвешенную сумму направлений текущего и следующего сегмента
      // чтобы враг начинал поворачивать заранее, а не в момент прихода в точку
      let blendedDir = dir.clone();
      if (enemy.pathIdx + 2 < ePath.length) {
        const nextNext = ePath[enemy.pathIdx + 2];
        const nextTarget = new THREE.Vector3(nextCell[1] * TILE_SIZE, 0, nextCell[0] * TILE_SIZE);
        const futureDir = new THREE.Vector3(
          nextNext[1] * TILE_SIZE - nextTarget.x,
          0,
          nextNext[0] * TILE_SIZE - nextTarget.z
        ).normalize();
        // Вес lookahead зависит от того как близко мы к следующей точке
        // Чем ближе (dist мал) — тем больше смотрим вперёд
        const lookaheadWeight = Math.max(0, 1 - dist / 0.8);
        blendedDir.lerp(futureDir, lookaheadWeight * 0.6);
        blendedDir.normalize();
      }

      // Quaternion slerp для совсем плавного поворота без прыжков
      const targetY = Math.atan2(blendedDir.x, blendedDir.z);
      const targetQuat = new THREE.Quaternion().setFromEuler(
        new THREE.Euler(enemy.model.rotation.x, targetY, enemy.model.rotation.z)
      );
      // Скорость поворота: 6 рад/с → плавно но достаточно быстро
      const rotSpeed = 6.0 * dt;
      enemy.model.quaternion.slerp(targetQuat, Math.min(1, rotSpeed));
    }
  }
  
  // Clean dead/reached
  enemies = enemies.filter(e => !e.dead && !e.reached);
}

function updateTowers(dt) {
  for (const tower of towers) {
    // Lightning turret: плавно возвращается в нейтраль если нет цели в зоне
    if (tower.def.id === 'lightning' && tower._turretHead) {
      const tPos0 = new THREE.Vector3(tower.col * TILE_SIZE, 0, tower.row * TILE_SIZE);
      const nearest = enemies.filter(e => !e.dead && !e.reached)
        .sort((a,b) => tPos0.distanceTo(a.model.position) - tPos0.distanceTo(b.model.position))[0];
      if (nearest && tPos0.distanceTo(nearest.model.position) <= tower.range * 1.5) {
        // Плавно следить за ближайшим врагом даже между выстрелами
        const dir2 = nearest.model.position.clone().sub(tPos0);
        const dist2 = dir2.length();
        const tY = Math.atan2(dir2.x, dir2.z);
        let dy = tY - tower._turretHead.rotation.y;
        while (dy >  Math.PI) dy -= Math.PI * 2;
        while (dy < -Math.PI) dy += Math.PI * 2;
        tower._turretHead.rotation.y += dy * 0.08;
        const tX = -Math.atan2(0.3, Math.max(dist2, 0.5));
        tower._turretHead.rotation.x += (tX - tower._turretHead.rotation.x) * 0.08;
      } else {
        // Возврат в нейтраль
        tower._turretHead.rotation.x += (0 - tower._turretHead.rotation.x) * 0.05;
      }
    }

    tower.cooldown = Math.max(0, tower.cooldown - dt);
    if (tower.cooldown > 0) continue;
    
    // Find target
    const tPos = new THREE.Vector3(tower.col * TILE_SIZE, 0, tower.row * TILE_SIZE);
    let best = null, bestPathIdx = -1;
    
    for (const enemy of enemies) {
      if (enemy.dead || enemy.reached) continue;
      const dist = tPos.distanceTo(enemy.model.position);
      if (dist > tower.range) continue;
      if (enemy.pathIdx > bestPathIdx) { best = enemy; bestPathIdx = enemy.pathIdx; }
    }
    
    if (!best) continue;
    
    tower.cooldown = 1 / tower.attackSpeed;
    
    // Special: lightning chains
    if (tower.def.id === 'lightning') {
      const nearby = enemies.filter(e => !e.dead && !e.reached &&
        tPos.distanceTo(e.model.position) <= tower.range);
      const targets = nearby.slice(0, 3);
      targets.forEach(t => damageEnemy(t, tower.damage, null));
      // Visual lightning effect
      if (targets.length > 0) spawnHitParticle(targets[0].model.position.clone(), tower.damage);
    } else {
      const effect = tower.def.id === 'freeze' ? 'freeze' : 
                     (tower.special || null);
      fireProjectile(tower, best);
    }
    
    // Rotate tower toward enemy
    const mesh = towerMeshes[tower.id];
    if (mesh) {
      if (tower.def.id === 'lightning') {
        // Lightning: база не вращается — только turret-голова наводится плавно
        if (tower._turretHead && best) {
          const tPos2 = new THREE.Vector3(tower.col * TILE_SIZE, 0, tower.row * TILE_SIZE);
          const dir2 = best.model.position.clone().sub(tPos2);
          const dist2 = dir2.length();
          // Горизонтальный поворот
          const targetY = Math.atan2(dir2.x, dir2.z);
          let dy = targetY - tower._turretHead.rotation.y;
          while (dy >  Math.PI) dy -= Math.PI * 2;
          while (dy < -Math.PI) dy += Math.PI * 2;
          tower._turretHead.rotation.y += dy * 0.12;
          // Вертикальный наклон — чуть вниз к врагу (максимум -25°)
          const targetX = -Math.atan2(0.3, Math.max(dist2, 0.5));
          tower._turretHead.rotation.x += (targetX - tower._turretHead.rotation.x) * 0.1;
        }
      } else {
        const dir = best.model.position.clone().sub(mesh.position);
        // Плавный поворот башни
        const targetY = Math.atan2(dir.x, dir.z);
        let dy = targetY - mesh.rotation.y;
        while (dy >  Math.PI) dy -= Math.PI * 2;
        while (dy < -Math.PI) dy += Math.PI * 2;
        mesh.rotation.y += dy * 0.15;
      }
    }
  }
}

function updateProjectiles(dt) {
  for (const proj of projectiles) {
    if (proj.dead) continue;
    
    const enemy = enemies.find(e => e.id === proj.targetId && !e.dead && !e.reached);
    if (!enemy) {
      proj.dead = true;
      scene.remove(proj.mesh);
      continue;
    }
    
    const dir = enemy.model.position.clone().sub(proj.mesh.position);
    const dist = dir.length();

    // Хвост снаряда тянется назад
    if (proj.trail) {
      proj.trail.position.copy(dir.clone().normalize().multiplyScalar(-0.22));
      proj.trail.scale.set(1, 1, 2.5);
    }

    if (dist < 0.2) {
      const effect = proj.tower.def.id === 'freeze' ? 'freeze' :
                     proj.tower.def.id === 'cannon' ? null : 
                     (proj.tower.special || null);
      
      // Splash for cannon
      if (proj.tower.def.id === 'cannon') {
        for (const e of enemies) {
          if (e.dead || e.reached) continue;
          if (enemy.model.position.distanceTo(e.model.position) < 1.2) {
            damageEnemy(e, proj.damage * 0.5, null);
          }
        }
        damageEnemy(enemy, proj.damage, null);
      } else {
        damageEnemy(enemy, proj.damage, effect);
      }
      
      proj.dead = true;
      scene.remove(proj.mesh);
    } else {
      dir.normalize();
      proj.mesh.position.add(dir.multiplyScalar(proj.speed * dt));
    }
  }
  
  projectiles = projectiles.filter(p => !p.dead);
}

// Обновляем анимации постройки (scale-in + белая вспышка)
function updatePlacementAnims(dt) {
  for (const a of _placementAnims) {
    a.t += dt;
    const prog = Math.min(a.t / a.dur, 1.0); // 0→1

    // Easing: быстро растёт, немного отскакивает в конце
    // cubic ease-out + небольшой overshoot
    let s;
    if (prog < 0.7) {
      // Быстрый рост: 0 → 1.2
      s = (prog / 0.7) * 1.22;
    } else {
      // Settling: 1.2 → 1.0
      const t2 = (prog - 0.7) / 0.3;
      s = 1.22 - t2 * 0.22;
    }
    a.model.scale.copy(a.baseScale).multiplyScalar(s);

    // Белая вспышка: нарастает к концу анимации, потом гаснет
    const flashProg = Math.max(0, (prog - 0.6) / 0.4); // 0→1 в последние 40%
    const flashIntensity = flashProg < 0.5
      ? flashProg / 0.5          // нарастает
      : 1.0 - (flashProg - 0.5) / 0.5; // гаснет

    a.model.traverse(m => {
      if (m.isMesh && m.material && m.material.emissive) {
        m.material.emissive.setRGB(flashIntensity, flashIntensity, flashIntensity);
      }
    });

    if (prog >= 1.0) {
      // Финал: сброс scale и emissive
      a.model.scale.copy(a.baseScale);
      a.model.traverse(m => {
        if (m.isMesh && m.material && m.material.emissive)
          m.material.emissive.setRGB(0, 0, 0);
      });
      a.done = true;
    }
  }
  _placementAnims = _placementAnims.filter(a => !a.done);
}

function updateParticles(dt) {
  for (const p of particles) {
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      continue;
    }
    const a = p.life / p.maxLife; // 1→0

    if (p.isFlash) {
      // Вспышка: быстро исчезает, растёт
      p.mesh.scale.setScalar(1.0 + (1.0 - a) * 2.5);
      p.mesh.material.opacity = a * a;
    } else if (p.isSmoke) {
      // Дым: медленно поднимается, растёт, исчезает
      p.vel.y -= 0.3 * dt; // чуть притормаживает
      p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
      p.mesh.scale.setScalar(1.0 + (1.0 - a) * 2.0);
      p.mesh.material.opacity = a * 0.65;
    } else if (p.isSpark) {
      // Искра: гравитация, яркая, резко гаснет
      p.vel.y -= 12 * dt;
      p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
      p.mesh.material.opacity = a > 0.4 ? 1.0 : a / 0.4;
    } else if (p.scale0) {
      // Огонь: гравитация, уменьшается
      p.vel.y -= 2 * dt;
      p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
      p.mesh.scale.setScalar(p.scale0 * (0.3 + a * 0.7));
      p.mesh.material.opacity = a;
    } else {
      // Обычные частицы попадания/смерти
      p.vel.y -= 9.8 * dt;
      p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
      if (p.mesh.material) p.mesh.material.opacity = a;
    }
  }
  particles = particles.filter(p => p.life > 0);
}

function updateWaveSpawner(dt) {
  if (!waveActive || spawnQueue.length === 0) return;
  
  spawnTimer -= dt;
  if (spawnTimer <= 0 && spawnQueue.length > 0) {
    const next = spawnQueue.shift();
    spawnEnemy(next.type, next.hpMult);
    spawnTimer = next.interval || 1;
  }
}

function checkWaveComplete() {
  if (!waveActive) return;
  if (spawnQueue.length > 0) return;
  if (enemies.some(e => !e.dead && !e.reached)) return;
  
  waveActive = false;
  
  document.getElementById('btn-start-wave').classList.add('primary');
  
  if (wave >= TOTAL_WAVES) {
    triggerVictory();
  } else {
    showWaveNotify(`Wave ${wave} Complete!`, `Prepare for Wave ${wave + 1}`);
    // Bonus gold
    gold += 50 + wave * 10;
    updateHUD();
  }
}

// ============================================================
// WAVE MANAGEMENT
// ============================================================
function startWave() {
  if (waveActive) return;
  if (path.length < 2) { alert('No valid path!'); return; }
  
  wave++;
  waveActive = true;
  
  const waveDef = buildWave(wave);
  const si = waveDef.spawnInterval;
  
  spawnQueue = waveDef.enemies.map(e => ({ ...e, interval: si }));
  spawnTimer = 0;
  
  
  document.getElementById('btn-start-wave').classList.remove('primary');
  
  const isFinalBoss = wave === 20;
  const isBoss = wave % 5 === 0;
  if (isFinalBoss) {
    showWaveNotify('☠ ВОЛНА 20 — BERDYEVA! ☠', 'Финальный босс пришёл! Удержи базу!');
  } else {
    showWaveNotify(`Волна ${wave}${isBoss ? ' 👹 BOSS' : ''}!`, isBoss ? 'Босс идёт!' : 'Защищай базу!');
  }
  
  updateHUD();
}

function showWaveNotify(title, sub) {
  const el = document.getElementById('wave-notify');
  document.getElementById('wn-title').textContent = title;
  document.getElementById('wn-sub').textContent = sub;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 2500);
}

// ============================================================
// UI
// ============================================================
function updateHUD() {
  document.getElementById('hud-gold').textContent = gold;
  document.getElementById('hud-lives').textContent = lives;
  document.getElementById('hud-gold').textContent = wave + '/' + TOTAL_WAVES;
  document.getElementById('hud-wave-text').textContent = gold;
  document.getElementById('hud-lives').textContent = lives;
  document.getElementById('wave-info').textContent = waveActive ? `Enemies: ${enemies.length + spawnQueue.length}` : 'Ready';
  
  // Update item card affordability
  document.querySelectorAll('.item-card').forEach(card => {
    const cost = parseInt(card.dataset.cost || '0');
    card.classList.toggle('disabled', gold < cost);
  });
}

// INPUT HANDLING
// ============================================================
function onCanvasClick(e) {
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  const mouse = new THREE.Vector2(mouseX, mouseY);

  // Editor mode
  if(editorActive) {
    // GRID MODE
    raycaster.setFromCamera(mouse, camera);

    // ERASE MODE — удалить тайл или free объект
    if(edEraseMode) {
      // Сначала проверяем free объекты
      const freeMeshesErase = [];
      edFreeObjects.forEach(fo => fo.mesh.traverse(m => { if(m.isMesh){ m._foRef=fo; freeMeshesErase.push(m); } }));
      if(freeMeshesErase.length > 0) {
        const freeHits = raycaster.intersectObjects(freeMeshesErase, false);
        if(freeHits.length > 0) {
          const fo = freeHits[0].object._foRef;
          if(fo) { deleteFreeObj(fo); document.getElementById('ed-info').textContent='🗑 Объект удалён'; return; }
        }
      }
      // Затем пробуем попасть в 3D тайл
      const tileMeshes = tileObjects.filter(o => o.userData.type === 'tile');
      const tHits = raycaster.intersectObjects(tileMeshes, true);
      let eraseR = -1, eraseC = -1;
      for(const h of tHits) {
        let o=h.object; while(o&&!o.userData.row&&o.userData.row!==0) o=o.parent;
        if(o && o.userData.row != null) { eraseR=o.userData.row; eraseC=o.userData.col; break; }
      }
      // Фоллбэк: плоскость
      if(eraseR<0) {
        const gp = new THREE.Plane(new THREE.Vector3(0,1,0),0);
        const pt = new THREE.Vector3();
        raycaster.ray.intersectPlane(gp, pt);
        if(pt) { eraseC=Math.round(pt.x/TILE_SIZE); eraseR=Math.round(pt.z/TILE_SIZE); }
      }
      if(eraseR>=0&&eraseR<GRID_H&&eraseC>=0&&eraseC<GRID_W) {
        // Удаляем: убираем 3D объект из сцены и сбрасываем в данных
        const oldObj = tileMeshGrid[eraseR][eraseC];
        if(oldObj) {
          scene.remove(oldObj);
          tileObjects = tileObjects.filter(o=>o!==oldObj);
          tileMeshGrid[eraseR][eraseC] = null;
        }
        delete edCellData[edKey(eraseR,eraseC)];
        editorGrid[eraseR][eraseC] = TILE_GRASS;
        document.getElementById('ed-info').textContent = `🗑 Удалено [${eraseR},${eraseC}] • продолжай тапать или выйди из режима`;
      }
      return;
    }

    // Также удаляем в свободном режиме
    if(edFreePlaceMode) { handleFreePlaceClick(e); return; }

    const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(groundPlane, pt);
    if(pt) {
      const c = Math.round(pt.x / TILE_SIZE);
      const r = Math.round(pt.z / TILE_SIZE);
      if(r>=0&&r<GRID_H&&c>=0&&c<GRID_W) editorPlaceTile(r, c);
    }
    return;
  }

  if (gameState !== 'playing') return;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Check tile hits
  const tileMeshes = tileObjects.filter(o => o.userData.type === 'tile');
  const intersects = raycaster.intersectObjects(tileMeshes, true);
  
  let hitTile = null;
  for (const hit of intersects) {
    let obj = hit.object;
    while (obj && !obj.userData.type) obj = obj.parent;
    if (obj && obj.userData.type === 'tile') { hitTile = obj; break; }
  }
  
  if (hitTile) {
    const { row, col, tileType } = hitTile.userData;
    
    if (selectedTowerType && (tileType === TILE_ZONE || tileType === TILE_GRASS)) {
      placeTower(row, col, selectedTowerType);
      return;
    }
    
    // Check tower click
    const towerHit = towers.find(t => t.row === row && t.col === col);
    if (towerHit) {
      showTowerInfo(towerHit);
      return;
    }
  }
  
  // Check tower model click
  const allMeshes = Object.values(towerMeshes);
  const towerIntersects = raycaster.intersectObjects(allMeshes, true);
  if (towerIntersects.length > 0) {
    let obj = towerIntersects[0].object;
    while (obj && !obj.userData.towerId) obj = obj.parent;
    if (obj) {
      const t = towers.find(t => t.id === obj.userData.towerId);
      if (t) { showTowerInfo(t); return; }
    }
  }
  
  deselectAll();
}

// Camera drag — supports both ROTATE and PAN modes
let pointers = {};
let isMoving = false;
let camMode = 'rotate'; // 'rotate' | 'pan'

function onPointerDown(e) {
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };

  // В свободном режиме — сразу проверяем гизмо на pointerdown
  if(edFreePlaceMode && edGizmo && edGizmo.visible && Object.keys(pointers).length === 1) {
    const canvas = document.getElementById('canvas');
    const rect = canvas.getBoundingClientRect();
    const mouseX = ((e.clientX-rect.left)/rect.width)*2-1;
    const mouseY = -((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(new THREE.Vector2(mouseX,mouseY), camera);
    const allGizmoMeshes = [];
    // Только ВИДИМЫЕ группы — иначе невидимые хитбоксы другого режима конфликтуют
    edGizmoArrows.forEach(grp=>{ if(!grp.visible) return; grp.traverse(m=>{if(m.isMesh) allGizmoMeshes.push(m);}); });
    const hits = raycaster.intersectObjects(allGizmoMeshes, false);
    if(hits.length > 0) {
      onGizmoDragStart(e, hits[0].object);
      isMoving = true; // блокируем обычный drag камеры
      return;
    }
  }

  if (Object.keys(pointers).length === 1) {
    isDragging = false;
    dragStart = { x: e.clientX, y: e.clientY };
    isMoving = false;
  }
}

function onPointerMove(e) {
  if (!pointers[e.pointerId]) return;

  // Gizmo drag takes priority
  if(edGizmoDragging) {
    onGizmoDragMove(e);
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    return;
  }

  const keys = Object.keys(pointers);

  if (keys.length === 2) {
    // Pinch zoom
    const otherKey = keys.find(k => parseInt(k) !== parseInt(e.pointerId));
    const other = pointers[otherKey];
    const cur = { x: e.clientX, y: e.clientY };
    const newDist = Math.hypot(cur.x - other.x, cur.y - other.y);
    const oldDist = Math.hypot(pointers[e.pointerId].x - other.x, pointers[e.pointerId].y - other.y);
    if (lastPinchDist > 0) {
      const delta = (oldDist - newDist) * 0.02;
      camDist = Math.max(5, Math.min(35, camDist + delta));
      updateCamera();
    }
    lastPinchDist = newDist;
    pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
    return;
  }

  const dx = e.clientX - pointers[e.pointerId].x;
  const dy = e.clientY - pointers[e.pointerId].y;
  if (Math.abs(dx) + Math.abs(dy) > 4) isMoving = true;

  if (isMoving) {
    if (camMode === 'rotate') {
      camAngle -= dx * 0.005;
      camElevation = Math.max(0.15, Math.min(1.3, camElevation + dy * 0.005));
    } else {
      // PAN: move camTarget in the camera's XZ plane
      const right = new THREE.Vector3();
      const forward = new THREE.Vector3();
      right.crossVectors(camera.getWorldDirection(forward), camera.up).normalize();
      forward.copy(camera.getWorldDirection(new THREE.Vector3()));
      forward.y = 0; forward.normalize();
      right.y = 0; right.normalize();
      const speed = camDist * 0.002;
      camTarget.addScaledVector(right, -dx * speed);
      camTarget.addScaledVector(forward, dy * speed);
    }
    updateCamera();
  }
  pointers[e.pointerId] = { x: e.clientX, y: e.clientY };
}

function onPointerUp(e) {
  if(edGizmoDragging) { onGizmoDragEnd(); delete pointers[e.pointerId]; lastPinchDist=0; return; }
  if (!isMoving && Object.keys(pointers).length === 1) {
    onCanvasClick(e);
  }
  delete pointers[e.pointerId];
  lastPinchDist = 0;
}

function onWheel(e) {
  camDist = Math.max(5, Math.min(35, camDist + e.deltaY * 0.02));
  updateCamera();
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame(mapGrid, customCellData, freeObjsData) {
  try {
  console.log('[startGame] called, mapGrid rows:', mapGrid ? mapGrid.length : 'null');
  grid = mapGrid.map(r => [...r]);
  path = computePath(grid);
  paths = computeAllPaths(grid);
  roadGraph = buildRoadGraph(grid);

  if (path.length < 2) {
    alert('Ошибка: на карте нет пути от старта до финиша!');
    return;
  }
  
  // Reset state
  towers = [];
  towerMeshes = {};
  enemies = [];
  projectiles = [];
  particles = [];
  spawnQueue = [];
  gold = 300;
  lives = 20;
  wave = 0;
  waveActive = false;
  gameSpeed = 1;
  selectedTowerType = null;
  selectedTower = null;
  
  // Build 3D map
  buildMap(grid, customCellData || null);
  // Пересоздаём кувшинки (clearScene их убрала из _persistentObjects тоже)
  if (window._spawnLilypads) window._spawnLilypads();
  buildReflection();
  // Загружаем свободно размещённые объекты (декор не на сетке)
  if (freeObjsData && freeObjsData.length > 0) {
    freeObjsData.forEach(fo => {
      const obj = assets.clone(fo.modelKey);
      if (!obj) return;
      // Применяем сохранённый scale
      const sc = typeof fo.scale === 'number' ? fo.scale : 1;
      obj.scale.set(sc, sc, sc);
      if (typeof fo.scale === 'object' && fo.scale !== null) {
        obj.scale.set(fo.scale.x, fo.scale.y, fo.scale.z);
      }
      obj.position.set(fo.pos.x, fo.pos.y, fo.pos.z);
      if (fo.rot) obj.rotation.set(fo.rot.x, fo.rot.y, fo.rot.z);
      obj.traverse(m => { if (m.isMesh) { m.castShadow = true; m.receiveShadow = true; } });
      obj.userData = { freeObj: true, modelKey: fo.modelKey };
      scene.add(obj);
      tileObjects.push(obj); // чтобы попало в отражение
      // Wobble для пальм и деревьев в freeObjs
      const _palmTreeKeys = ['pirate_palm_straight','pirate_palm_bend',
        'pirate_palm_detailed_straight','pirate_palm_detailed_bend',
        'tile_tree','tile_tree_double','tile_tree_quad',
        'snow_tile_tree','snow_tile_tree_double'];
      if (_palmTreeKeys.includes(fo.modelKey)) {
        const _fp = Math.random() * Math.PI * 2;
        const _fs = 1.0 + Math.random() * 1.2;  // было 0.5+0.6
        const _fa = 0.015 + Math.random() * 0.012; // было 0.05+0.05
        applyWobble(obj, { phase: _fp, speed: _fs, amp: _fa });
      }
    });
    buildReflection(); // перестроим отражение с учётом freeObjs
  }
  
  // Show game UI
  document.getElementById('main-menu').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('bottom-panel').classList.remove('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  document.getElementById('cam-mode-btn').classList.remove('hidden');
  camMode = 'rotate';
  document.getElementById('cam-mode-btn').querySelector('img').src = 'assets/icons/ic_cursor.png';
  
  buildBottomPanel();
  // Update panel height CSS var so hud-bottom-right sits above it
  requestAnimationFrame(()=>{
    const p=document.getElementById('bottom-panel');
    if(p){document.documentElement.style.setProperty('--panel-h', p.offsetHeight+'px'); const br=document.getElementById('hud-br'); if(br) br.style.bottom=(p.offsetHeight+14)+'px';}
  });
  updateHUD();
  
  gameState = 'playing';
  updateCamera();
  } catch(e) {
    console.error('startGame error:', e);
    alert('Ошибка запуска игры: ' + e.message);
  }
}

// ============================================================
// EVENT LISTENERS
// ============================================================
function setupEvents() {
  const canvas = document.getElementById('canvas');
  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointercancel', e => delete pointers[e.pointerId]);
  canvas.addEventListener('wheel', onWheel, { passive: true });
  canvas.addEventListener('mousemove', e => { onMouseMove(e); updateEditorHover(e); });
  
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
  
  // HUD buttons
  document.getElementById('btn-start-wave').addEventListener('click', startWave);
  
  document.getElementById('cam-mode-btn').addEventListener('click', () => {
    camMode = camMode === 'rotate' ? 'pan' : 'rotate';
    document.getElementById('cam-mode-btn').querySelector('img').src = camMode==='rotate' ? 'assets/icons/ic_cursor.png' : 'assets/icons/ic_refresh.png';
  });
  
  document.getElementById('btn-speed').addEventListener('click', () => {
    gameSpeed = gameSpeed === 1 ? 2 : gameSpeed === 2 ? 3 : 1;
    document.getElementById('speed-txt').textContent = `${gameSpeed}x`;
  });
  
  document.getElementById('btn-exit').addEventListener('click', goToMenu);
  
  // Tower info
  document.getElementById('btn-upgrade').addEventListener('click', () => {
    if (selectedTower) upgradeTower(selectedTower);
  });
  document.getElementById('btn-sell').addEventListener('click', () => {
    if (selectedTower) sellTower(selectedTower);
  });
  document.getElementById('btn-deselect').addEventListener('click', deselectAll);
  
  // Main menu
  document.getElementById('btn-play').addEventListener('click', () => {
    console.log('[PLAY] button clicked');
    startGame(DEFAULT_MAP, null, DEFAULT_FREE_OBJS);
  });
  document.getElementById('btn-maps').addEventListener('click', openMyMaps);
  document.getElementById('btn-maps-close').addEventListener('click', () => {
    document.getElementById('my-maps-modal').classList.add('hidden');
  });
  document.getElementById('btn-editor').addEventListener('click', openEditor);
  setupEditorEvents();
  
  // Game over
  document.getElementById('btn-go-retry').addEventListener('click', () => startGame(DEFAULT_MAP, null, DEFAULT_FREE_OBJS));
  document.getElementById('btn-go-menu').addEventListener('click', goToMenu);
  document.getElementById('btn-win-menu').addEventListener('click', goToMenu);
}

      list.appendChild(row);
    });
    list.querySelectorAll('.mm-play').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const map = saved[idx];
        modal.classList.add('hidden');
        startGame(map.grid, map.cellData || null, map.freeObjs || []);
      });
    });
    list.querySelectorAll('.mm-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        saved.splice(idx, 1);
        localStorage.setItem('td_saved_maps', JSON.stringify(saved));
        openMyMaps(); // refresh
      });
    });
  }
  modal.classList.remove('hidden');
}

// ══ МУЗЫКАЛЬНЫЙ ПЛЕЕР ══════════════════════════════════════════
(function() {
  const TRACKS = [
    'assets/music/track1.mp3',
    'assets/music/track2.mp3',
  ];
  let _trackIdx = 0;
  let _muted = false;
  const _audio = new Audio();
  _audio.volume = 0.45;
  _audio.preload = 'none';

  function _playTrack(idx) {
    _trackIdx = ((idx % TRACKS.length) + TRACKS.length) % TRACKS.length;
    _audio.src = TRACKS[_trackIdx];
    _audio.load();
    if (!_muted) _audio.play().catch(()=>{});
  }

  // Когда трек закончился — следующий
  _audio.addEventListener('ended', () => _playTrack(_trackIdx + 1));

  // Запуск после первого взаимодействия пользователя
  function _startOnInteraction() {
    if (_audio.paused && !_muted) _playTrack(0);
    document.removeEventListener('pointerdown', _startOnInteraction);
    document.removeEventListener('keydown', _startOnInteraction);
  }
  document.addEventListener('pointerdown', _startOnInteraction);
  document.addEventListener('keydown', _startOnInteraction);

  function _updateIcons() {
    const icon = _muted ? 'assets/icons/ic_music_off.png' : 'assets/icons/ic_music_on.png';
    const el1 = document.getElementById('btn-music-icon');
    const el2 = document.getElementById('btn-music-menu-icon');
    if (el1) el1.src = icon;
    if (el2) el2.src = icon;
  }

  function _toggle() {
    _muted = !_muted;
    if (_muted) {
      _audio.pause();
    } else {
      if (_audio.src && _audio.paused) {
        _audio.play().catch(()=>{});
      } else if (!_audio.src) {
        _playTrack(0);
      }
    }
    _updateIcons();
  }

  // Модуль выполняется после парсинга DOM — DOMContentLoaded уже сработал.
  // Используем прямой поиск элементов + requestAnimationFrame для гарантии.
  function _wireButtons() {
    const b1 = document.getElementById('btn-music');
    const b2 = document.getElementById('btn-music-menu');
    if (b1) b1.addEventListener('click', _toggle);
    if (b2) b2.addEventListener('click', _toggle);
  }
  // Если DOM уже готов — вешаем сразу, иначе ждём
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', _wireButtons);
  } else {
    _wireButtons();
  }

  window._musicToggle = _toggle;
})();
